# ============================================================
# Video Depth Anything V3 - KITTI (Eigen split) training config
# ============================================================

# Path to the cloned Video-Depth-Anything repository. Its `video_depth_anything`
# package will be imported by prepending this path to `sys.path`.
vda_repo_path: /home/izi2sgh/MYDATA/quanjie/liren/depth_baselines/Video-Depth-Anything

model:
  # one of: vits / vitb / vitl
  encoder: vitl
  # pretrained checkpoint downloaded from the official repo
  pretrained_ckpt: /home/izi2sgh/MYDATA/quanjie/liren/depth_baselines/Video-Depth-Anything/checkpoints/metric_video_depth_anything_vitl.pth
  # Whether to build the model in metric mode (sigmoid*max_depth head).
  metric_depth: true
  max_depth: 80.0
  min_depth: 0.001
  # Freeze the DINOv2 backbone (encoder) when training starts.
  freeze_backbone: true
  # Unfreeze the backbone at this epoch index (0-based).  -1 means never unfreeze.
  freeze_backbone_until_epoch: 5

data:
  # Root directory for KITTI. Expected layout:
  #   {data_root}/raw/...            -> RGB images (KITTI raw)
  #   {data_root}/depth/train/...    -> KITTI depth GT (train)
  #   {data_root}/depth/val/...      -> KITTI depth GT (val)
  data_root: /home/izi2sgh/MYDATA/quanjie/liren/depth-v3/training-for-depth-anything-v3/kitti_root
  # Directory containing eigen_{train,val,test}_files.txt from BTS.
  split_dir: /home/izi2sgh/MYDATA/quanjie/liren/depth-v3/training-for-depth-anything-v3/splits
  train_split: eigen_train_files.txt
  # BTS ships only train + test splits; reuse test as validation.
  val_split: eigen_test_files.txt
  test_split: eigen_test_files.txt
  # NOTE: DINOv2 requires H and W to be multiples of 14. The model.forward() will
  # auto-resize to the nearest multiple of 14 internally so any H/W works here.
  input_height: 350
  input_width: 1218
  num_workers: 8

training:
  batch_size: 4
  max_epochs: 25
  lr: 1.0e-4
  backbone_lr_factor: 0.1
  weight_decay: 0.01
  optimizer: adamw          # adamw | adam | sgd
  scheduler: cosine         # cosine | none
  warmup_epochs: 2
  gradient_clip_val: 1.0

loss:
  silog_weight: 1.0
  l1_weight: 0.1
  grad_weight: 0.5
  silog_variance_focus: 0.85

logging:
  project_name: depth_anything_v3
  experiment_name: kitti_eigen_vitl
  log_dir: logs
  save_top_k: 3
  monitor_metric: val/abs_rel
  monitor_mode: min

hardware:
  accelerator: gpu
  devices: 1
  precision: 16-mixed
  strategy: auto
